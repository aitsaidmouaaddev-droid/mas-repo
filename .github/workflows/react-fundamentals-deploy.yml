name: "react-fundamentals · deploy"

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  migrate:
    name: "Migrate DB"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/react-fundamentals
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: npm run db:run

  deploy-backend:
    name: "Deploy Backend"
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.AZURE_ACR_NAME }}

      - name: Build and push Docker image
        run: |
          IMAGE=${{ vars.AZURE_ACR_NAME }}.azurecr.io/react-fundamentals-api:${{ github.sha }}
          docker build \
            -f apps/react-fundamentals/Dockerfile \
            -t "$IMAGE" \
            .
          docker push "$IMAGE"

      - name: Deploy to Container Apps
        run: |
          IMAGE=${{ vars.AZURE_ACR_NAME }}.azurecr.io/react-fundamentals-api:${{ github.sha }}
          PRINCIPAL_ID=$(az containerapp identity assign \
            --name ${{ vars.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --system-assigned \
            --query principalId -o tsv)
          ACR_ID=$(az acr show --name ${{ vars.AZURE_ACR_NAME }} --query id -o tsv)
          az role assignment create \
            --assignee "$PRINCIPAL_ID" \
            --role AcrPull \
            --scope "$ACR_ID" \
            2>/dev/null || true
          az containerapp registry set \
            --name ${{ vars.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --server ${{ vars.AZURE_ACR_NAME }}.azurecr.io \
            --identity system
          az containerapp ingress enable \
            --name ${{ vars.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --type external \
            --target-port 4311 \
            --transport auto
          az containerapp update \
            --name ${{ vars.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image "$IMAGE" \
            --no-wait

  deploy-frontend:
    name: "Deploy Frontend"
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npx nx build react-fundamentals

      - name: Deploy to Azure SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_SKY_02F1E6F03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "apps/react-fundamentals/dist"
          api_location: ""
          output_location: ""
          skip_app_build: true
