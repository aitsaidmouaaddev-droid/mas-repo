name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/react-fundamentals/**"
      - "libs/nest/**"
      - "libs/shared/**"
      - "libs/react/**"
      - "libs/react-fundamentals/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/azure-static-web-apps-white-sky-02f1e6f03.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "apps/react-fundamentals/**"
      - "libs/nest/**"
      - "libs/shared/**"
      - "libs/react/**"
      - "libs/react-fundamentals/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/azure-static-web-apps-white-sky-02f1e6f03.yml"

jobs:
  # ── Gate: CI must pass first ──────────────────────────────────────────────────
  ci:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    uses: ./.github/workflows/react-fundamentals-ci.yml

  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    needs: ci
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_SKY_02F1E6F03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "apps/react-fundamentals"
          api_location: ""
          output_location: "dist/apps/react-fundamentals"
          app_build_command: "npx nx build react-fundamentals"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_SKY_02F1E6F03 }}
          action: "close"
