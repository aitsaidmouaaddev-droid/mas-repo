name: "PR Preview — react-fundamentals"

# Only fires for the dev → main PR (our standard merge flow).
# Azure SWA free tier allows 1 staging environment — this ensures we never
# create more than one by limiting to a single known source branch.
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
    paths:
      - "apps/react-fundamentals/src/**"
      - "apps/react-fundamentals/public/**"
      - "libs/react/**"
      - "libs/shared/**"
      - "package.json"
      - "package-lock.json"

jobs:
  deploy-preview:
    if: github.head_ref == 'dev' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Deploy PR Preview
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npx nx build react-fundamentals

      - name: Deploy Preview to Azure SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_SKY_02F1E6F03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "apps/react-fundamentals/dist"
          api_location: ""
          output_location: ""
          skip_app_build: true

  close-preview:
    if: github.head_ref == 'dev' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Preview
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_SKY_02F1E6F03 }}
          action: "close"
