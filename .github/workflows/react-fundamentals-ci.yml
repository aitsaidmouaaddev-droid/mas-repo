name: "CI — react-fundamentals"

on:
  workflow_call: # Allow CD workflow to call this as a reusable workflow
  push:
    branches: [dev]
    paths:
      - "apps/react-fundamentals/**"
      - "libs/nest/**"
      - "libs/shared/**"
      - "libs/react/**"
      - "libs/react-games/**"
      - "libs/react-fundamentals/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/react-fundamentals-ci.yml"
  pull_request:
    branches: [dev, main]
    paths:
      - "apps/react-fundamentals/**"
      - "libs/nest/**"
      - "libs/shared/**"
      - "libs/react/**"
      - "libs/react-games/**"
      - "libs/react-fundamentals/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/react-fundamentals-ci.yml"

concurrency:
  group: ci-react-fundamentals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx nx lint react-fundamentals

      - name: Typecheck (frontend)
        run: npx nx typecheck react-fundamentals

      - name: Typecheck (server)
        run: npx nx typecheck:server react-fundamentals

      - name: Test
        run: npx nx test react-fundamentals --run

      - name: Build (frontend)
        run: npx nx build react-fundamentals
