# ─────────────────────────────────────────────────────────────────────────────
# Per-app CI for test-deploy.
#
# Triggers when files in apps/test-deploy/ change directly.
# For transitive changes (a shared lib this app depends on changed),
# the global ci.yml handles it via nx affected.
# ─────────────────────────────────────────────────────────────────────────────

name: test-deploy CI

on:
  push:
    branches: [dev, main]
    paths:
      - 'apps/test-deploy/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
  pull_request:
    branches: [dev, main]
    paths:
      - 'apps/test-deploy/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'

jobs:
  check:
    name: Lint + Test + Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint + Test + Typecheck
        run: npx nx run-many --projects=test-deploy --target=lint,test,typecheck
