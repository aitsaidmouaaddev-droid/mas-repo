# ─────────────────────────────────────────────────────────────────────────────
# App-level CD — rn-pic-swipe-wipe (React Native / Expo).
#
# Trigger:
#   Fires when a PR from dev → main is MERGED.
#
# Version control:
#   Handled locally by the Husky pre-push hook before pushing to dev.
#   The hook asks: patch | minor | major | skip, bumps package.json,
#   commits it to the branch, and creates a local git tag.
#   This workflow does NOT touch versioning — it reads what's already there.
#
# Release gate:
#   The CD checks whether the current version in package.json already has a
#   remote tag (rn-pic-swipe-wipe/vX.Y.Z). If yes → already deployed, skip.
#   If no → new version, proceed with EAS build and push the tag.
#   This means: merging dev→main without a version bump does nothing here.
#
# Required:
#   - GitHub secret: EXPO_TOKEN (expo.dev → Account Settings → Access Tokens)
#   - eas.json inside apps/rn-pic-swipe-wipe/ with a production profile
# ─────────────────────────────────────────────────────────────────────────────

name: rn-pic-swipe-wipe CD

on:
  pull_request:
    # Fires when a PR targeting main is closed (merged or declined).
    # The job `if` below filters to merged-only.
    types: [closed]
    branches: [main]

jobs:
  release:
    name: EAS Build (production)
    # Only run if the PR was actually merged, not just closed/declined.
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    # Required to push the release tag back to the remote.
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── 3. Install ───────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── 4. Check if this version is already released ──────────────────────────
      # Reads the version from the app's package.json and checks whether a
      # matching remote tag already exists.
      # - If the tag exists: the version was already deployed → skip the build.
      # - If the tag is missing: this is a new version → proceed.
      # This is the gate that makes "merging without a version bump" a no-op.
      - name: Check if version is already released
        id: version_check
        run: |
          VERSION=$(node -p "require('./apps/rn-pic-swipe-wipe/package.json').version")
          TAG="rn-pic-swipe-wipe/v$VERSION"
          # Write to GITHUB_ENV so subsequent steps can use $VERSION and $TAG in shell.
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            # Write to GITHUB_OUTPUT so step conditionals (if:) can reference it statically.
            echo "is_new_release=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists — nothing to deploy."
          else
            echo "is_new_release=true" >> $GITHUB_OUTPUT
            echo "New version $VERSION detected — proceeding with release."
          fi

      # ── 5. Push release tag ───────────────────────────────────────────────────
      # Creates and pushes the remote tag so the release is traceable in git history.
      # The local tag was already created by the Husky pre-push hook on the
      # developer's machine; this makes it official on the remote.
      - name: Push release tag
        if: steps.version_check.outputs.is_new_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      # ── 6. Install EAS CLI ────────────────────────────────────────────────────
      - name: Install EAS CLI
        if: steps.version_check.outputs.is_new_release == 'true'
        run: npm install -g eas-cli

      # ── 7. EAS Build (Android — production) ───────────────────────────────────
      # Uploads the source to Expo's cloud servers for a native Android build.
      # --profile production = uses the production profile from eas.json
      #   (store-signed AAB, ready for Google Play)
      # --non-interactive    = required in CI (no prompts)
      # EXPO_TOKEN           = authenticates with your Expo account
      - name: EAS Build (Android)
        if: steps.version_check.outputs.is_new_release == 'true'
        working-directory: apps/rn-pic-swipe-wipe
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile production --non-interactive
