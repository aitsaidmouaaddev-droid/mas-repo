# ─────────────────────────────────────────────────────────────────────────────
# Monorepo CD — single orchestrator for all apps.
#
# Trigger:
#   Fires on every push to main (i.e. after a squash-merge from dev).
#   No path filters here — the detect job figures out what changed.
#
# Flow:
#   1. detect   — runs `nx show projects --affected` to produce boolean outputs
#                 (one per app). Apps not affected are completely skipped.
#   2. Per-app chains — each app has its own CI job (reusable workflow_call) and
#                 one or more deploy jobs that depend on the CI job succeeding.
#
# Job naming convention:
#   - CI caller jobs:     name: "[app]"          → graph shows "[app] / [inner job]"
#   - Deploy caller jobs: name: "[app] · deploy"  → graph shows "[app] · deploy / [inner job]"
#   - Inline jobs:        name: "[app] · [action]"
#
# Adding a new app (manual steps — or run the generator which does this for you):
#   1. Add a line in detect.outputs        (under # __INJECT_DETECT_OUTPUTS__)
#   2. Add an echo line in detect steps    (under # __INJECT_DETECT_STEPS__)
#   3. Add the CI + deploy job block       (under # __INJECT_APP_JOBS__)
# ─────────────────────────────────────────────────────────────────────────────

name: Monorepo CD

on:
  push:
    branches: [main]

concurrency:
  group: monorepo-cd
  cancel-in-progress: false   # never cancel an in-flight deployment

# ─── 1. Detect ────────────────────────────────────────────────────────────────
jobs:
  detect:
    name: Detect affected apps
    runs-on: ubuntu-latest
    outputs:
      react-fundamentals:      ${{ steps.check.outputs.react-fundamentals }}
      mas-videos-generator:    ${{ steps.check.outputs.mas-videos-generator }}
      mas-videos-generator-bo: ${{ steps.check.outputs.mas-videos-generator-bo }}
      rn-pic-swipe-wipe:       ${{ steps.check.outputs.rn-pic-swipe-wipe }}
      storybook-launcher:      ${{ steps.check.outputs.storybook-launcher }}
      # __INJECT_DETECT_OUTPUTS__

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Detect affected apps
        id: check
        run: |
          AFFECTED=$(npx nx show projects --affected --base=HEAD~1 --head=HEAD --json 2>/dev/null || echo '[]')
          echo "Affected projects: $AFFECTED"
          if [[ "$AFFECTED" == "[]" || -z "$AFFECTED" ]]; then
            echo "No affected apps — nothing to deploy."
          fi
          echo "react-fundamentals=$(echo "$AFFECTED"      | jq 'contains(["react-fundamentals"])')"      >> $GITHUB_OUTPUT
          echo "mas-videos-generator=$(echo "$AFFECTED"    | jq 'contains(["mas-videos-generator"])')"    >> $GITHUB_OUTPUT
          echo "mas-videos-generator-bo=$(echo "$AFFECTED" | jq 'contains(["mas-videos-generator-bo"])')" >> $GITHUB_OUTPUT
          echo "rn-pic-swipe-wipe=$(echo "$AFFECTED"       | jq 'contains(["@mas/rn-pic-swipe-wipe"])')"  >> $GITHUB_OUTPUT
          echo "storybook-launcher=$(echo "$AFFECTED"      | jq 'contains(["@mas/storybook-launcher"])')" >> $GITHUB_OUTPUT
          # __INJECT_DETECT_STEPS__

  # ─── react-fundamentals ──────────────────────────────────────────────────────
  ci-react-fundamentals:
    name: "react-fundamentals"
    needs: detect
    if: needs.detect.outputs.react-fundamentals == 'true'
    uses: ./.github/workflows/react-fundamentals-ci.yml

  deploy-react-fundamentals:
    name: "react-fundamentals · deploy"
    needs: [detect, ci-react-fundamentals]
    if: needs.detect.outputs.react-fundamentals == 'true'
    uses: ./.github/workflows/react-fundamentals-deploy.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: read

  # ─── mas-videos-generator ────────────────────────────────────────────────────
  ci-mas-videos-generator:
    name: "mas-videos-generator"
    needs: detect
    if: needs.detect.outputs.mas-videos-generator == 'true'
    uses: ./.github/workflows/mas-videos-generator-ci.yml

  deploy-mas-videos-generator:
    name: "mas-videos-generator · deploy"
    needs: [detect, ci-mas-videos-generator]
    if: needs.detect.outputs.mas-videos-generator == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy placeholder
        run: echo "TODO — add mas-videos-generator deploy steps (Docker, Cloud Run, etc.)"

  # ─── mas-videos-generator-bo ─────────────────────────────────────────────────
  ci-mas-videos-generator-bo:
    name: "mas-videos-generator-bo"
    needs: detect
    if: needs.detect.outputs.mas-videos-generator-bo == 'true'
    uses: ./.github/workflows/mas-videos-generator-bo-ci.yml

  deploy-mas-videos-generator-bo:
    name: "mas-videos-generator-bo · deploy"
    needs: [detect, ci-mas-videos-generator-bo]
    if: needs.detect.outputs.mas-videos-generator-bo == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy placeholder
        run: echo "TODO — add mas-videos-generator-bo deploy steps (Vercel, Netlify, S3, etc.)"

  # ─── rn-pic-swipe-wipe ───────────────────────────────────────────────────────
  ci-rn-pic-swipe-wipe:
    name: "rn-pic-swipe-wipe"
    needs: detect
    if: needs.detect.outputs.rn-pic-swipe-wipe == 'true'
    uses: ./.github/workflows/rn-pic-swipe-wipe-ci.yml

  release-rn-pic-swipe-wipe:
    name: "rn-pic-swipe-wipe · release"
    needs: [detect, ci-rn-pic-swipe-wipe]
    if: needs.detect.outputs.rn-pic-swipe-wipe == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check if version is already released
        id: version_check
        run: |
          VERSION=$(node -p "require('./apps/rn-pic-swipe-wipe/package.json').version")
          TAG="rn-pic-swipe-wipe/v$VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "is_new_release=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists — nothing to deploy."
          else
            echo "is_new_release=true" >> $GITHUB_OUTPUT
            echo "New version $VERSION detected — proceeding with release."
          fi

      - name: Push release tag
        if: steps.version_check.outputs.is_new_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Install EAS CLI
        if: steps.version_check.outputs.is_new_release == 'true'
        run: npm install -g eas-cli

      - name: EAS Build (Android)
        if: steps.version_check.outputs.is_new_release == 'true'
        working-directory: apps/rn-pic-swipe-wipe
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile production --non-interactive

  # ─── storybook-launcher ───────────────────────────────────────────────────────
  ci-storybook-launcher:
    name: "storybook-launcher"
    needs: detect
    if: needs.detect.outputs.storybook-launcher == 'true'
    uses: ./.github/workflows/storybook-launcher-ci.yml

  # No deploy for storybook-launcher yet.

  # __INJECT_APP_JOBS__
