name: "CD — react-fundamentals backend"

on:
  push:
    branches: [main]
    paths:
      - "apps/react-fundamentals/server/**"
      - "apps/react-fundamentals/migrations/**"
      - "apps/react-fundamentals/datasource.ts"
      - "apps/react-fundamentals/package.json"
      - "libs/nest/**"
      - "libs/shared/**"
      - "libs/react/**"
      - "libs/react-fundamentals/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "apps/react-fundamentals/Dockerfile"
      - ".github/workflows/react-fundamentals-cd-backend.yml"

concurrency:
  group: cd-backend-react-fundamentals-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  # ── Gate: CI must pass first ──────────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/react-fundamentals-ci.yml

  # ── Build & Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: Build image & deploy to Container Apps
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.AZURE_ACR_NAME }}

      - name: Build and push Docker image
        run: |
          IMAGE=${{ vars.AZURE_ACR_NAME }}.azurecr.io/react-fundamentals-api:${{ github.sha }}
          docker build \
            -f apps/react-fundamentals/Dockerfile \
            -t "$IMAGE" \
            .
          docker push "$IMAGE"

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ vars.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ vars.AZURE_ACR_NAME }}.azurecr.io/react-fundamentals-api:${{ github.sha }}
