name: "CD — react-fundamentals"

on:
  push:
    branches: [main]
    paths:
      - "apps/react-fundamentals/**"
      - "libs/nest/**"
      - "libs/shared/**"
      - "libs/react/**"
      - "libs/react-fundamentals/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/react-fundamentals-cd.yml"

concurrency:
  group: cd-react-fundamentals-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  # ── 1. CI gate ────────────────────────────────────────────────────────────────
  ci:
    name: "CI / Lint · Typecheck · Test · Build"
    uses: ./.github/workflows/react-fundamentals-ci.yml

  # ── 2. Deploy backend ─────────────────────────────────────────────────────────
  deploy-backend:
    name: "Deploy Backend → Container Apps"
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.AZURE_ACR_NAME }}

      - name: Build and push Docker image
        run: |
          IMAGE=${{ vars.AZURE_ACR_NAME }}.azurecr.io/react-fundamentals-api:${{ github.sha }}
          docker build \
            -f apps/react-fundamentals/Dockerfile \
            -t "$IMAGE" \
            .
          docker push "$IMAGE"

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ vars.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ vars.AZURE_ACR_NAME }}.azurecr.io/react-fundamentals-api:${{ github.sha }}

  # ── 3. Deploy frontend ────────────────────────────────────────────────────────
  deploy-frontend:
    name: "Deploy Frontend → Static Web Apps"
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npx nx build react-fundamentals

      - name: Deploy to Azure SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_SKY_02F1E6F03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dist/apps/react-fundamentals"
          api_location: ""
          output_location: ""
          skip_app_build: true
